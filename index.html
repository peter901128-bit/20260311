<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추천</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --vegas-sign-red: #d41f3d;
      --vegas-sign-red-bright: #e63946;
      --vegas-sign-blue: #1e5f9e;
      --vegas-sign-cyan: #5eb8e6;
      --vegas-sign-cyan-light: #7dd3fc;
      --vegas-gold: #f4c430;
      --vegas-gold-bright: #ffd700;
      --vegas-gold-dim: #c9a227;
      --vegas-red: #c41e3a;
      --vegas-purple: #6a0dad;
      --vegas-neon-blue: #00d4ff;
      --vegas-neon-pink: #ff1493;
      --vegas-white: #fefefe;
      --vegas-bg-dark: #0f1620;
      --vegas-carpet: #1a2332;
      --vegas-panel: #151d28;
      --vegas-panel-border: #3d4a5c;
      --vegas-screen: #0a0e14;
      --vegas-text: #f0f4f8;
      --vegas-text-muted: #8ba3b8;
      --vegas-glow-gold: rgba(244, 196, 48, 0.5);
      --vegas-glow-red: rgba(212, 31, 61, 0.4);
      --radius: 10px;
      --radius-sm: 6px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--vegas-bg-dark);
      min-height: 100vh;
      color: var(--vegas-text);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 100% 60% at 50% 0%, rgba(94, 184, 230, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(244, 196, 48, 0.06) 0%, transparent 45%),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 60px,
          rgba(0,0,0,0.03) 60px,
          rgba(0,0,0,0.03) 61px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 60px,
          rgba(0,0,0,0.03) 60px,
          rgba(0,0,0,0.03) 61px
        );
      pointer-events: none;
      z-index: 0;
    }

    .navbar {
      height: 56px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      border-bottom: 2px solid var(--vegas-gold-dim);
      background: linear-gradient(180deg, rgba(21,29,40,0.98) 0%, rgba(15,22,32,0.95) 100%);
      position: relative;
      z-index: 1;
    }

    .lang {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      color: var(--vegas-sign-cyan-light);
      background: none;
      border: none;
      cursor: pointer;
    }

    .container {
      max-width: 460px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo-tagline {
      font-family: 'Great Vibes', cursive;
      font-size: 1.5rem;
      color: var(--vegas-sign-cyan-light);
      margin-bottom: 0.15rem;
      letter-spacing: 0.02em;
      text-shadow: 0 0 20px rgba(94, 184, 230, 0.4);
    }

    .logo {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-weight: 400;
      font-size: 3.2rem;
      letter-spacing: 0.2em;
      color: var(--vegas-sign-red);
      line-height: 1;
      text-shadow:
        0 0 0 2px var(--vegas-gold),
        0 0 15px var(--vegas-glow-red),
        0 0 30px rgba(212, 31, 61, 0.3),
        0 3px 6px rgba(0,0,0,0.5);
    }

    .logo-sub {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.35em;
      color: var(--vegas-sign-blue);
      margin-top: 0.2rem;
    }

    .card {
      background: linear-gradient(165deg, var(--vegas-panel) 0%, #1c2530 100%);
      border: 3px solid var(--vegas-panel-border);
      border-radius: var(--radius);
      padding: 2rem 2.25rem;
      width: 100%;
      box-shadow:
        inset 0 0 0 1px rgba(254, 254, 254, 0.04),
        0 0 0 1px var(--vegas-gold-dim),
        0 0 30px rgba(0,0,0,0.5),
        0 8px 32px rgba(0,0,0,0.4);
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: calc(var(--radius) + 2px);
      border: 2px dashed var(--vegas-gold-dim);
      pointer-events: none;
      opacity: 0.4;
    }

    .field-label {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      color: var(--vegas-sign-cyan-light);
      font-weight: 400;
      margin-bottom: 0.5rem;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .field-label::after {
      content: '';
      display: block;
      width: 2em;
      height: 2px;
      background: linear-gradient(90deg, var(--vegas-gold), transparent);
      margin-top: 0.2rem;
    }

    .slot-machine-wrap {
      display: flex;
      align-items: stretch;
      gap: 0;
      margin-bottom: 1rem;
      max-width: 100%;
    }

    .slot-machine {
      flex: 1;
      min-width: 0;
      background: linear-gradient(180deg, #1a2332 0%, #0f1620 50%, #0a0e14 100%);
      border: 4px solid var(--vegas-gold-dim);
      border-radius: 12px;
      padding: 0;
      box-shadow:
        inset 0 0 0 2px rgba(0,0,0,0.4),
        inset 0 2px 4px rgba(255,255,255,0.03),
        0 6px 24px rgba(0,0,0,0.5);
      position: relative;
    }

    .slot-machine-marquee {
      background: linear-gradient(180deg, var(--vegas-gold) 0%, var(--vegas-gold-dim) 100%);
      color: var(--vegas-sign-red);
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      text-align: center;
      padding: 0.4rem 0.6rem;
      border-radius: 8px 8px 0 0;
      text-shadow: 0 1px 0 rgba(0,0,0,0.3);
      border-bottom: 3px solid #0f1620;
    }

    .slot-machine-body {
      padding: 0.75rem 0.6rem 0.9rem;
    }

    .result-box {
      background: #0a0e14;
      border: 3px solid var(--vegas-gold-dim);
      border-radius: 8px;
      padding: 0.7rem 0.5rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      box-shadow:
        inset 0 0 0 2px rgba(0,0,0,0.5),
        inset 0 0 30px rgba(0,0,0,0.6);
    }

    .result-box:focus-within {
      border-color: var(--vegas-gold);
      box-shadow: 0 0 15px var(--vegas-glow-gold), inset 0 0 30px rgba(0,0,0,0.6);
    }

    .result-box.drawing {
      border-color: var(--vegas-gold);
      box-shadow: 0 0 20px var(--vegas-glow-gold), 0 0 40px rgba(244, 196, 48, 0.2), inset 0 0 30px rgba(0,0,0,0.6);
      animation: pulse-glow 0.8s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px var(--vegas-glow-gold), 0 0 40px rgba(244, 196, 48, 0.2), inset 0 0 30px rgba(0,0,0,0.6); }
      50% { box-shadow: 0 0 30px var(--vegas-glow-gold), 0 0 60px rgba(244, 196, 48, 0.35), inset 0 0 30px rgba(0,0,0,0.6); }
    }

    .draw-status {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--vegas-sign-red);
      min-height: 1.5rem;
      margin-bottom: 0.5rem;
      transition: opacity 0.2s;
      text-shadow: 0 0 12px var(--vegas-glow-red);
    }

    .draw-status.empty {
      color: var(--vegas-text-muted);
      text-shadow: none;
    }

    .result-area {
      min-height: 48px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .bonus-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      margin-top: 0;
      padding-top: 0;
      padding-left: 0.5rem;
      margin-left: 0.5rem;
      border-top: none;
      border-left: 2px solid var(--vegas-panel-border);
    }

    .bonus-label {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.85rem;
      color: var(--vegas-sign-cyan);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .ball.bonus {
      background: linear-gradient(145deg, var(--vegas-gold-bright), var(--vegas-gold-dim));
      color: #1a0f0a;
      box-shadow: 0 0 12px var(--vegas-glow-gold), inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .ball {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .result-area .ball,
    .result-box .ball {
      width: 38px;
      height: 38px;
      font-size: 0.9rem;
    }

    .result-area .slot-result,
    .result-box .slot-result {
      width: 38px;
      height: 38px;
      font-size: 1.15rem;
    }

    /* 슬롯머신 릴 창 (머신 안에서 굴러가는 창) */
    .reel-viewport {
      width: 38px;
      height: 38px;
      border-radius: 4px;
      overflow: hidden;
      background: #e8e4dc;
      border: 2px solid var(--vegas-gold-dim);
      flex-shrink: 0;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.15),
        inset 0 2px 4px rgba(255,255,255,0.5),
        0 1px 2px rgba(0,0,0,0.3);
    }

    .reel-strip {
      will-change: transform;
      transition: transform 1.8s cubic-bezier(0.15, 0.85, 0.25, 1);
    }

    .reel-cell {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-weight: 400;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
      color: var(--vegas-sign-red);
      background: #e8e4dc;
      flex-shrink: 0;
      text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    }

    .reel-viewport.bonus-reel {
      border-color: var(--vegas-gold);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1), inset 0 2px 4px rgba(255,255,255,0.5), 0 0 8px var(--vegas-glow-gold);
    }

    .reel-viewport.bonus-reel .reel-cell {
      background: #e8e4dc;
      color: var(--vegas-sign-red);
    }

    /* 릴 멈춘 뒤 슬롯 창에 보이는 번호 (실제 슬롯처럼) */
    .slot-result {
      width: 38px;
      height: 38px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--vegas-sign-red);
      background: #e8e4dc;
      border: 2px solid var(--vegas-gold-dim);
      flex-shrink: 0;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1), inset 0 2px 4px rgba(255,255,255,0.5), 0 1px 2px rgba(0,0,0,0.3);
      animation: slot-result-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .slot-result.bonus {
      border-color: var(--vegas-gold);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1), inset 0 2px 4px rgba(255,255,255,0.5), 0 0 8px var(--vegas-glow-gold);
    }

    @keyframes slot-result-pop {
      0% { transform: scale(0.9); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    .ball:hover {
      transform: scale(1.05);
    }

    .ball.placeholder {
      background: var(--vegas-panel-border);
      color: var(--vegas-text-muted);
      font-size: 1.1rem;
    }

    .ball.reveal {
      animation: ball-reveal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes ball-reveal {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .ball.bonus.reveal {
      animation: bonus-reveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes bonus-reveal {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      70% { transform: scale(1.2) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .ball-1 { background: linear-gradient(145deg, #e63946, #c41e3a); box-shadow: 0 0 12px rgba(196, 30, 58, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
    .ball-2 { background: linear-gradient(145deg, #f4a261, #e76f51); box-shadow: 0 0 12px rgba(231, 111, 81, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
    .ball-3 { background: linear-gradient(145deg, var(--vegas-gold-bright), var(--vegas-gold-dim)); color: #1a0f0a; box-shadow: 0 0 12px var(--vegas-glow-gold), inset 0 1px 0 rgba(255,255,255,0.4); }
    .ball-4 { background: linear-gradient(145deg, #2a9d8f, #1d6b62); box-shadow: 0 0 12px rgba(42, 157, 143, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
    .ball-5 { background: linear-gradient(145deg, var(--vegas-neon-blue), #0096c7); box-shadow: 0 0 12px rgba(0, 212, 255, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
    .ball-6 { background: linear-gradient(145deg, #9d4edd, var(--vegas-purple)); box-shadow: 0 0 12px rgba(106, 13, 173, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }

    /* 슬롯머신 레버 */
    .slot-lever {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 0.5rem;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .slot-lever:focus-visible {
      outline: 2px solid var(--vegas-gold);
      outline-offset: 4px;
    }

    .slot-lever[aria-disabled="true"] {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .slot-lever-arm {
      width: 14px;
      height: 52px;
      background: linear-gradient(90deg, #2a2a2a 0%, #1a1a1a 50%, #252525 100%);
      border-radius: 3px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.4);
      transform-origin: top center;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-bottom: -4px;
    }

    .slot-lever-knob {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--vegas-sign-red-bright), var(--vegas-sign-red));
      border: 3px solid rgba(0,0,0,0.25);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.3),
        0 4px 8px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }

    .slot-lever.pulled .slot-lever-arm {
      transform: rotate(28deg);
    }

    .slot-lever[aria-disabled="true"] .slot-lever-arm {
      transform: rotate(28deg);
    }

    .slot-lever-label {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--vegas-gold-dim);
      margin-top: 0.25rem;
    }

    .options {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid var(--vegas-panel-border);
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .option-row:last-child {
      margin-bottom: 0;
    }

    .option-row label {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      color: var(--vegas-sign-cyan-light);
      font-weight: 400;
    }

    .option-row input[type="number"] {
      width: 72px;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      background: var(--vegas-screen);
      border: 2px solid var(--vegas-panel-border);
      border-radius: var(--radius-sm);
      color: var(--vegas-text);
      font-family: inherit;
    }

    .option-row input:focus {
      outline: none;
      border-color: var(--vegas-gold-dim);
      box-shadow: 0 0 10px var(--vegas-glow-gold);
    }

    .sets-container {
      margin-top: 1.5rem;
    }

    .sets-title {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      color: var(--vegas-sign-cyan);
      margin-bottom: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .set-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 0.5rem;
    }

    .set-row .ball {
      width: 34px;
      height: 34px;
      font-size: 0.8rem;
    }

    .set-row .bonus-label {
      font-size: 0.75rem;
      margin-left: 0.25rem;
      margin-right: 0.1rem;
      color: var(--vegas-text-muted);
    }

    .set-row .ball.bonus {
      width: 34px;
      height: 34px;
      font-size: 0.8rem;
    }

    .card-footer {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 2px solid var(--vegas-panel-border);
      text-align: center;
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--vegas-sign-cyan);
    }

    .card-footer a {
      color: var(--vegas-sign-cyan-light);
      text-decoration: none;
    }

    .card-footer .divider {
      margin: 0 0.5rem;
      color: var(--vegas-gold-dim);
    }

    .page-footer {
      margin-top: 2rem;
      text-align: center;
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--vegas-text-muted);
    }

    .page-footer .divider {
      margin: 0 0.4rem;
    }

    .lotto-2026-section {
      margin-top: 2.5rem;
      width: 100%;
      max-width: 460px;
    }

    .lotto-2026-title {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--vegas-sign-red);
      margin-bottom: 0.75rem;
      padding-bottom: 0.35rem;
      border-bottom: 2px solid var(--vegas-gold-dim);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      text-shadow: 0 0 10px var(--vegas-glow-red);
    }

    .lotto-2026-meta {
      font-size: 0.75rem;
      color: var(--vegas-text-muted);
      margin-bottom: 0.6rem;
    }

    .lotto-2026-balls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .lotto-2026-balls .ball {
      width: 38px;
      height: 38px;
      font-size: 0.9rem;
    }

    .lotto-2026-balls .bonus-label {
      font-size: 0.75rem;
      margin: 0 0.2rem;
    }

    .lotto-recent-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .lotto-recent-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
    }

    .lotto-recent-round {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--vegas-sign-red);
      min-width: 4rem;
      flex-shrink: 0;
    }

    .lotto-recent-date {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: var(--vegas-sign-cyan);
      min-width: 3.8rem;
      flex-shrink: 0;
    }

    .lotto-recent-row .ball {
      width: 28px;
      height: 28px;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .lotto-recent-row .bonus-label {
      font-size: 0.65rem;
      margin: 0 0.1rem;
      color: var(--vegas-text-muted);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <button type="button" class="lang" aria-label="언어 선택">한국어</button>
  </nav>

  <div class="container">
    <header class="logo-wrap">
      <p class="logo-tagline">행운의</p>
      <h1 class="logo">LOTTO</h1>
      <p class="logo-sub">번호 추천</p>
    </header>

    <div class="card">
      <span class="field-label">추천 번호</span>
      <div class="draw-status empty" id="drawStatus" aria-live="polite"></div>
      <div class="slot-machine-wrap">
        <div class="slot-machine">
          <div class="slot-machine-marquee">LOTTO</div>
          <div class="slot-machine-body">
            <div class="result-box" tabindex="-1" id="resultBox">
              <div class="result-area" id="resultArea">
                <span class="ball placeholder">?</span>
                <span class="ball placeholder">?</span>
                <span class="ball placeholder">?</span>
                <span class="ball placeholder">?</span>
                <span class="ball placeholder">?</span>
                <span class="ball placeholder">?</span>
              </div>
              <div class="bonus-area" id="bonusArea">
                <span class="bonus-label">보너스</span>
                <span class="ball bonus placeholder">?</span>
              </div>
            </div>
          </div>
        </div>
        <div class="slot-lever" id="btnGenerate" role="button" tabindex="0" aria-label="번호 뽑기 레버">
          <div class="slot-lever-arm"></div>
          <div class="slot-lever-knob"></div>
          <span class="slot-lever-label">PULL</span>
        </div>
      </div>

      <div class="options">
        <div class="option-row">
          <label for="setCount">한 번에 생성할 세트 수</label>
          <input type="number" id="setCount" min="1" max="10" value="1">
        </div>
      </div>

      <div class="sets-container" id="setsContainer" style="display: none;">
        <div class="sets-title">생성된 번호 세트</div>
        <div id="setsList"></div>
      </div>

      <div class="card-footer">
        <span>참고용</span><span class="divider">|</span><span>당첨 보장 없음</span><span class="divider">|</span><span>나눔로또</span>
      </div>
    </div>

    <section class="lotto-2026-section" aria-label="최근 10회 로또 1등 당첨번호">
      <h2 class="lotto-2026-title">최근 10회 1등 당첨번호</h2>
      <div class="lotto-recent-list" id="lottoRecentList"></div>
    </section>

    <footer class="page-footer">
      1~45 중 무작위 6개 + 보너스 번호를 추천합니다
    </footer>
  </div>

  <script>
    const MIN = 1;
    const MAX = 45;
    const PICK = 6;
    const BALL_CLASSES = ['ball-1', 'ball-2', 'ball-3', 'ball-4', 'ball-5', 'ball-6'];
    const REEL_ROUNDS = 5;
    const REEL_CELL_HEIGHT = 38;
    const REEL_TOTAL_CELLS = MAX * REEL_ROUNDS;
    const REEL_DURATION_MS = 1800;
    const DELAY_BETWEEN_BALLS = 850;
    const DELAY_BEFORE_BONUS = 500;

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generateOneSet() {
      const pool = Array.from({ length: MAX - MIN + 1 }, (_, i) => MIN + i);
      const shuffled = shuffle(pool);
      const numbers = shuffled.slice(0, PICK).sort((a, b) => a - b);
      const rest = shuffled.slice(PICK);
      const bonus = rest[Math.floor(Math.random() * rest.length)];
      return { numbers, bonus };
    }

    function getBallClass(index) {
      return BALL_CLASSES[index % BALL_CLASSES.length];
    }

    function createBall(num, addRevealClass = false) {
      const ball = document.createElement('span');
      const idx = parseInt(num, 10);
      ball.className = `ball ${getBallClass(Math.floor((idx - 1) / 8))}`;
      if (addRevealClass) ball.classList.add('reveal');
      ball.textContent = num;
      return ball;
    }

    function createBonusBall(num, addRevealClass = false) {
      const ball = document.createElement('span');
      ball.className = 'ball bonus';
      if (addRevealClass) ball.classList.add('reveal');
      ball.textContent = num;
      return ball;
    }

    function createSlotResult(num, isBonus) {
      const el = document.createElement('span');
      el.className = 'slot-result' + (isBonus ? ' bonus' : '');
      el.textContent = num;
      return el;
    }

    function setDrawStatus(text, highlight = true) {
      const el = document.getElementById('drawStatus');
      el.textContent = text;
      el.classList.toggle('empty', !text || !highlight);
    }

    function sleep(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }

    function createReelStrip(finalNum, isBonus) {
      const viewport = document.createElement('div');
      viewport.className = 'reel-viewport' + (isBonus ? ' bonus-reel' : '');
      const strip = document.createElement('div');
      strip.className = 'reel-strip';
      for (let r = 0; r < REEL_ROUNDS; r++) {
        for (let n = 1; n <= MAX; n++) {
          const cell = document.createElement('div');
          cell.className = 'reel-cell';
          cell.textContent = n;
          strip.appendChild(cell);
        }
      }
      viewport.appendChild(strip);
      const stopIndex = 2 * MAX + (finalNum - 1);
      const finalTranslate = -(stopIndex * REEL_CELL_HEIGHT);
      strip.style.transform = 'translateY(0)';
      viewport._strip = strip;
      viewport._finalTranslate = finalTranslate;
      viewport._finalNum = finalNum;
      viewport._isBonus = isBonus;
      return viewport;
    }

    function runReel(reelViewport) {
      return new Promise((resolve) => {
        const strip = reelViewport._strip;
        const finalTranslate = reelViewport._finalTranslate;
        reelViewport._resolve = resolve;
        strip.style.transition = 'transform ' + (REEL_DURATION_MS / 1000) + 's cubic-bezier(0.15, 0.85, 0.25, 1)';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            strip.style.transform = 'translateY(' + finalTranslate + 'px)';
          });
        });
        const onEnd = () => {
          strip.removeEventListener('transitionend', onEnd);
          if (reelViewport._resolve) reelViewport._resolve();
        };
        strip.addEventListener('transitionend', onEnd);
        setTimeout(() => {
          if (reelViewport._resolve) {
            strip.removeEventListener('transitionend', onEnd);
            reelViewport._resolve();
          }
        }, REEL_DURATION_MS + 200);
      });
    }

    async function runDraw(sets, btn, resultBox) {
      const main = sets[0];
      const resultArea = document.getElementById('resultArea');
      const bonusArea = document.getElementById('bonusArea');
      const bonusBallEl = bonusArea.querySelector('.ball.bonus') || bonusArea.querySelector('.slot-result.bonus');

      btn.setAttribute('aria-disabled', 'true');
      btn.classList.add('pulled');
      resultBox.classList.add('drawing');

      resultArea.innerHTML = '';
      for (let i = 0; i < PICK; i++) {
        const slot = document.createElement('span');
        slot.className = 'ball placeholder';
        slot.textContent = '?';
        resultArea.appendChild(slot);
      }
      bonusBallEl.textContent = '?';
      bonusBallEl.classList.add('placeholder');

      setDrawStatus('추첨 준비 중...', true);
      await sleep(700);

      for (let i = 0; i < PICK; i++) {
        setDrawStatus((i + 1) + '번째 번호!', true);
        const slot = resultArea.children[i];
        const num = main.numbers[i];
        const reel = createReelStrip(num, false);
        slot.replaceWith(reel);
        await runReel(reel);
        const resultEl = createSlotResult(num, false);
        reel.replaceWith(resultEl);
        await sleep(DELAY_BETWEEN_BALLS);
      }

      setDrawStatus('보너스 번호!', true);
      await sleep(DELAY_BEFORE_BONUS);

      const bonusReel = createReelStrip(main.bonus, true);
      bonusBallEl.replaceWith(bonusReel);
      await runReel(bonusReel);
      const bonusResult = createSlotResult(main.bonus, true);
      bonusReel.replaceWith(bonusResult);

      setDrawStatus('추첨 완료!', true);
      await sleep(1400);
      setDrawStatus('', false);

      resultBox.classList.remove('drawing');
      btn.setAttribute('aria-disabled', 'false');
      btn.classList.remove('pulled');
    }

    function renderMainBalls(numbers, bonus) {
      const area = document.getElementById('resultArea');
      area.innerHTML = '';
      numbers.forEach((num) => area.appendChild(createSlotResult(num, false)));
      const bonusArea = document.getElementById('bonusArea');
      var bonusEl = bonusArea.querySelector('.ball.bonus');
      if (bonusEl) {
        var slotBonus = createSlotResult(bonus, true);
        bonusEl.replaceWith(slotBonus);
      } else {
        var existingBonus = bonusArea.querySelector('.slot-result.bonus');
        if (existingBonus) existingBonus.textContent = bonus;
        else bonusArea.appendChild(createSlotResult(bonus, true));
      }
    }

    function renderSets(sets) {
      const container = document.getElementById('setsContainer');
      const list = document.getElementById('setsList');
      list.innerHTML = '';
      if (sets.length === 0) {
        container.style.display = 'none';
        return;
      }
      container.style.display = 'block';
      sets.forEach((set) => {
        const row = document.createElement('div');
        row.className = 'set-row';
        set.numbers.forEach((num) => row.appendChild(createBall(num)));
        const bonusLabel = document.createElement('span');
        bonusLabel.className = 'bonus-label';
        bonusLabel.textContent = '보너스';
        row.appendChild(bonusLabel);
        row.appendChild(createBonusBall(set.bonus));
        list.appendChild(row);
      });
    }

    let isDrawing = false;

    async function runGenerate() {
      if (isDrawing) return;
      const setCountInput = document.getElementById('setCount');
      const setCount = Math.min(10, Math.max(1, parseInt(setCountInput.value, 10) || 1));
      setCountInput.value = setCount;

      const sets = [];
      for (let i = 0; i < setCount; i++) sets.push(generateOneSet());

      const btn = document.getElementById('btnGenerate');
      const resultBox = document.getElementById('resultBox');

      isDrawing = true;
      await runDraw(sets, btn, resultBox);
      isDrawing = false;

      if (setCount > 1) renderSets(sets);
      else document.getElementById('setsContainer').style.display = 'none';
    }

    var lever = document.getElementById('btnGenerate');
    lever.addEventListener('click', function () {
      if (lever.getAttribute('aria-disabled') === 'true') return;
      lever.classList.add('pulled');
      setTimeout(function () { runGenerate(); }, 280);
    });
    lever.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      e.preventDefault();
      if (lever.getAttribute('aria-disabled') === 'true') return;
      lever.classList.add('pulled');
      setTimeout(function () { runGenerate(); }, 280);
    });

    // 최근 10회 1등 당첨번호 (웹 검색 기준)
    const LOTTO_RECENT_10 = [
      { round: 1214, date: '2026.3.7', numbers: [10, 15, 19, 27, 30, 33], bonus: 14 },
      { round: 1213, date: '2026.2.28', numbers: [5, 11, 25, 27, 36, 38], bonus: 2 },
      { round: 1212, date: '2026.2.21', numbers: [5, 8, 25, 31, 41, 44], bonus: 45 },
      { round: 1211, date: '2026.2.14', numbers: [23, 26, 27, 35, 38, 40], bonus: 10 },
      { round: 1210, date: '2026.2.7', numbers: [1, 7, 9, 17, 27, 38], bonus: 31 },
      { round: 1209, date: '2026.1.31', numbers: [2, 17, 20, 35, 37, 39], bonus: 24 },
      { round: 1208, date: '2026.1.24', numbers: [6, 27, 30, 36, 38, 42], bonus: 25 },
      { round: 1207, date: '2026.1.17', numbers: [10, 22, 24, 27, 38, 45], bonus: 11 },
      { round: 1206, date: '2026.1.10', numbers: [1, 3, 17, 26, 27, 42], bonus: 23 },
      { round: 1205, date: '2026.1.3', numbers: [1, 4, 16, 23, 31, 41], bonus: 2 }
    ];

    function createHistoryBall(num) {
      const ball = document.createElement('span');
      ball.className = `ball ${getBallClass(Math.floor((num - 1) / 8))}`;
      ball.textContent = num;
      return ball;
    }

    function renderLottoRecent() {
      const list = document.getElementById('lottoRecentList');
      list.innerHTML = '';
      LOTTO_RECENT_10.forEach(function (row) {
        const wrap = document.createElement('div');
        wrap.className = 'lotto-recent-row';
        const roundEl = document.createElement('span');
        roundEl.className = 'lotto-recent-round';
        roundEl.textContent = row.round + '회';
        const dateEl = document.createElement('span');
        dateEl.className = 'lotto-recent-date';
        dateEl.textContent = row.date;
        wrap.appendChild(roundEl);
        wrap.appendChild(dateEl);
        row.numbers.forEach(function (n) { wrap.appendChild(createHistoryBall(n)); });
        const bonusLabel = document.createElement('span');
        bonusLabel.className = 'bonus-label';
        bonusLabel.textContent = '보너스';
        wrap.appendChild(bonusLabel);
        const bonusBall = document.createElement('span');
        bonusBall.className = 'ball bonus';
        bonusBall.textContent = row.bonus;
        wrap.appendChild(bonusBall);
        list.appendChild(wrap);
      });
    }

    // 첫 화면: 번호만 표시 (추첨 연출 없이)
    (function init() {
      const set = generateOneSet();
      renderMainBalls(set.numbers, set.bonus);
      document.getElementById('setsContainer').style.display = 'none';
      renderLottoRecent();
    })();
  </script>
</body>
</html>
