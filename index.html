<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추천</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --vegas-sign-red: #d41f3d;
      --vegas-sign-red-bright: #e63946;
      --vegas-sign-blue: #1e5f9e;
      --vegas-sign-cyan: #5eb8e6;
      --vegas-sign-cyan-light: #7dd3fc;
      --vegas-gold: #f4c430;
      --vegas-gold-bright: #ffd700;
      --vegas-gold-dim: #c9a227;
      --vegas-red: #c41e3a;
      --vegas-purple: #6a0dad;
      --vegas-neon-blue: #00d4ff;
      --vegas-neon-pink: #ff1493;
      --vegas-white: #fefefe;
      --vegas-bg-dark: #0f1620;
      --vegas-carpet: #1a2332;
      --vegas-panel: #151d28;
      --vegas-panel-border: #3d4a5c;
      --vegas-screen: #0a0e14;
      --vegas-text: #f0f4f8;
      --vegas-text-muted: #8ba3b8;
      --vegas-glow-gold: rgba(244, 196, 48, 0.5);
      --vegas-glow-red: rgba(212, 31, 61, 0.4);
      --radius: 10px;
      --radius-sm: 6px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--vegas-bg-dark);
      min-height: 100vh;
      color: var(--vegas-text);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 100% 60% at 50% 0%, rgba(94, 184, 230, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(244, 196, 48, 0.06) 0%, transparent 45%),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 60px,
          rgba(0,0,0,0.03) 60px,
          rgba(0,0,0,0.03) 61px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 60px,
          rgba(0,0,0,0.03) 60px,
          rgba(0,0,0,0.03) 61px
        );
      pointer-events: none;
      z-index: 0;
    }

    .navbar {
      height: 56px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      border-bottom: 2px solid var(--vegas-gold-dim);
      background: linear-gradient(180deg, rgba(21,29,40,0.98) 0%, rgba(15,22,32,0.95) 100%);
      position: relative;
      z-index: 1;
    }

    .lang {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      color: var(--vegas-sign-cyan-light);
      background: none;
      border: none;
      cursor: pointer;
    }

    .container {
      max-width: 460px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo-tagline {
      font-family: 'Great Vibes', cursive;
      font-size: 1.5rem;
      color: var(--vegas-sign-cyan-light);
      margin-bottom: 0.15rem;
      letter-spacing: 0.02em;
      text-shadow: 0 0 20px rgba(94, 184, 230, 0.4);
    }

    .logo {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-weight: 400;
      font-size: 3.2rem;
      letter-spacing: 0.2em;
      color: var(--vegas-sign-red);
      line-height: 1;
      text-shadow:
        0 0 0 2px var(--vegas-gold),
        0 0 15px var(--vegas-glow-red),
        0 0 30px rgba(212, 31, 61, 0.3),
        0 3px 6px rgba(0,0,0,0.5);
    }

    .logo-sub {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.35em;
      color: var(--vegas-sign-blue);
      margin-top: 0.2rem;
    }

    .card {
      background: linear-gradient(165deg, var(--vegas-panel) 0%, #1c2530 100%);
      border: 3px solid var(--vegas-panel-border);
      border-radius: var(--radius);
      padding: 2rem 2.25rem;
      width: 100%;
      box-shadow:
        inset 0 0 0 1px rgba(254, 254, 254, 0.04),
        0 0 0 1px var(--vegas-gold-dim),
        0 0 30px rgba(0,0,0,0.5),
        0 8px 32px rgba(0,0,0,0.4);
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: calc(var(--radius) + 2px);
      border: 2px dashed var(--vegas-gold-dim);
      pointer-events: none;
      opacity: 0.4;
    }

    .field-label {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      color: var(--vegas-sign-cyan-light);
      font-weight: 400;
      margin-bottom: 0.5rem;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .field-label::after {
      content: '';
      display: block;
      width: 2em;
      height: 2px;
      background: linear-gradient(90deg, var(--vegas-gold), transparent);
      margin-top: 0.2rem;
    }

    .result-box {
      background: var(--vegas-screen);
      border: 2px solid var(--vegas-panel-border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    .result-area {
      min-height: 48px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .bonus-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      margin-top: 0;
      padding-top: 0;
      padding-left: 0.5rem;
      margin-left: 0.5rem;
      border-top: none;
      border-left: 2px solid var(--vegas-panel-border);
    }

    .bonus-label {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.85rem;
      color: var(--vegas-sign-cyan);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .ball.bonus {
      background: linear-gradient(145deg, var(--vegas-gold-bright), var(--vegas-gold-dim));
      color: #1a0f0a;
      box-shadow: 0 0 12px var(--vegas-glow-gold), inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .ball {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .result-area .ball,
    .result-box .ball {
      width: 38px;
      height: 38px;
      font-size: 0.9rem;
    }

    .ball:hover {
      transform: scale(1.05);
    }

    .ball.placeholder {
      background: var(--vegas-panel-border);
      color: var(--vegas-text-muted);
      font-size: 1.1rem;
    }

    .ball-1 { background: linear-gradient(145deg, #e63946, #c41e3a); box-shadow: 0 0 12px rgba(196, 30, 58, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
    .ball-2 { background: linear-gradient(145deg, #f4a261, #e76f51); box-shadow: 0 0 12px rgba(231, 111, 81, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
    .ball-3 { background: linear-gradient(145deg, var(--vegas-gold-bright), var(--vegas-gold-dim)); color: #1a0f0a; box-shadow: 0 0 12px var(--vegas-glow-gold), inset 0 1px 0 rgba(255,255,255,0.4); }
    .ball-4 { background: linear-gradient(145deg, #2a9d8f, #1d6b62); box-shadow: 0 0 12px rgba(42, 157, 143, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
    .ball-5 { background: linear-gradient(145deg, var(--vegas-neon-blue), #0096c7); box-shadow: 0 0 12px rgba(0, 212, 255, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
    .ball-6 { background: linear-gradient(145deg, #9d4edd, var(--vegas-purple)); box-shadow: 0 0 12px rgba(106, 13, 173, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }

    .btn-generate {
      width: 100%;
      padding: 0.95rem 1.5rem;
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--vegas-white);
      background: linear-gradient(180deg, var(--vegas-sign-red-bright) 0%, var(--vegas-sign-red) 100%);
      border: 2px solid var(--vegas-gold);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 0.5rem;
      box-shadow: 0 0 20px var(--vegas-glow-red), inset 0 1px 0 rgba(255,255,255,0.25);
    }
    .save-status {
      margin: 0.25rem 0 0.5rem;
      font-size: 0.85rem;
      color: var(--vegas-cyan);
      min-height: 1.2em;
    }
    .save-status.error {
      color: #ffb3b3;
    }

    .btn-generate:hover {
      background: linear-gradient(180deg, #eb4d5c 0%, var(--vegas-sign-red-bright) 100%);
      box-shadow: 0 0 30px var(--vegas-glow-red);
    }

    .options {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid var(--vegas-panel-border);
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .option-row:last-child {
      margin-bottom: 0;
    }

    .option-row label {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      color: var(--vegas-sign-cyan-light);
      font-weight: 400;
    }

    .option-row input[type="number"] {
      width: 72px;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      background: var(--vegas-screen);
      border: 2px solid var(--vegas-panel-border);
      border-radius: var(--radius-sm);
      color: var(--vegas-text);
      font-family: inherit;
    }

    .option-row input:focus {
      outline: none;
      border-color: var(--vegas-gold-dim);
      box-shadow: 0 0 10px var(--vegas-glow-gold);
    }

    .sets-container {
      margin-top: 1.5rem;
    }

    .sets-title {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      color: var(--vegas-sign-cyan);
      margin-bottom: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .set-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 0.5rem;
    }

    .set-row .ball {
      width: 34px;
      height: 34px;
      font-size: 0.8rem;
    }

    .set-row .bonus-label {
      font-size: 0.75rem;
      margin-left: 0.25rem;
      margin-right: 0.1rem;
      color: var(--vegas-text-muted);
    }

    .set-row .ball.bonus {
      width: 34px;
      height: 34px;
      font-size: 0.8rem;
    }

    .card-footer {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 2px solid var(--vegas-panel-border);
      text-align: center;
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--vegas-sign-cyan);
    }

    .card-footer a {
      color: var(--vegas-sign-cyan-light);
      text-decoration: none;
    }

    .card-footer .divider {
      margin: 0 0.5rem;
      color: var(--vegas-gold-dim);
    }

    .page-footer {
      margin-top: 2rem;
      text-align: center;
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--vegas-text-muted);
    }

    .page-footer .divider {
      margin: 0 0.4rem;
    }

    .lotto-2026-section {
      margin-top: 2.5rem;
      width: 100%;
      max-width: 460px;
    }

    .lotto-2026-title {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--vegas-sign-red);
      margin-bottom: 0.75rem;
      padding-bottom: 0.35rem;
      border-bottom: 2px solid var(--vegas-gold-dim);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      text-shadow: 0 0 10px var(--vegas-glow-red);
    }

    .lotto-2026-meta {
      font-size: 0.75rem;
      color: var(--vegas-text-muted);
      margin-bottom: 0.6rem;
    }

    .lotto-2026-balls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .lotto-2026-balls .ball {
      width: 38px;
      height: 38px;
      font-size: 0.9rem;
    }

    .lotto-2026-balls .bonus-label {
      font-size: 0.75rem;
      margin: 0 0.2rem;
    }

    .lotto-recent-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .lotto-recent-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
    }

    .lotto-recent-round {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--vegas-sign-red);
      min-width: 4rem;
      flex-shrink: 0;
    }

    .lotto-recent-date {
      font-family: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: var(--vegas-sign-cyan);
      min-width: 3.8rem;
      flex-shrink: 0;
    }

    .lotto-recent-row .ball {
      width: 28px;
      height: 28px;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .lotto-recent-row .bonus-label {
      font-size: 0.65rem;
      margin: 0 0.1rem;
      color: var(--vegas-text-muted);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <button type="button" class="lang" aria-label="언어 선택">한국어</button>
  </nav>

  <div class="container">
    <header class="logo-wrap">
      <p class="logo-tagline">행운의</p>
      <h1 class="logo">LOTTO</h1>
      <p class="logo-sub">번호 추천</p>
    </header>

    <div class="card">
      <span class="field-label">추천 번호</span>
      <div class="result-box" id="resultBox">
        <div class="result-area" id="resultArea">
          <span class="ball placeholder">?</span>
          <span class="ball placeholder">?</span>
          <span class="ball placeholder">?</span>
          <span class="ball placeholder">?</span>
          <span class="ball placeholder">?</span>
          <span class="ball placeholder">?</span>
        </div>
        <div class="bonus-area" id="bonusArea">
          <span class="bonus-label">보너스</span>
          <span class="ball bonus placeholder">?</span>
        </div>
      </div>
      <button type="button" class="btn-generate" id="btnGenerate">번호 뽑기</button>
      <p class="save-status" id="saveStatus" aria-live="polite"></p>

      <div class="options">
        <div class="option-row">
          <label for="setCount">한 번에 생성할 세트 수</label>
          <input type="number" id="setCount" min="1" max="10" value="1">
        </div>
      </div>

      <div class="sets-container" id="setsContainer" style="display: none;">
        <div class="sets-title">생성된 번호 세트</div>
        <div id="setsList"></div>
      </div>

      <div class="card-footer">
        <span>참고용</span><span class="divider">|</span><span>당첨 보장 없음</span><span class="divider">|</span><span>나눔로또</span>
      </div>
    </div>

    <section class="lotto-2026-section" aria-label="최근 10회 로또 1등 당첨번호">
      <h2 class="lotto-2026-title">최근 10회 1등 당첨번호</h2>
      <div class="lotto-recent-list" id="lottoRecentList"></div>
    </section>

    <footer class="page-footer">
      1~45 중 무작위 6개 + 보너스 번호를 추천합니다
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase 설정: Vercel 배포 시 /api/config 에서 환경 변수 로드
    let supabaseConfig = { url: '', key: '' };
    (function loadSupabaseConfig() {
      fetch('/api/config')
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (data) {
          supabaseConfig.url = data.supabaseUrl || '';
          supabaseConfig.key = data.supabaseAnonKey || '';
        })
        .catch(function () {});
    })();

    const MIN = 1;
    const MAX = 45;
    const PICK = 6;
    const BALL_CLASSES = ['ball-1', 'ball-2', 'ball-3', 'ball-4', 'ball-5', 'ball-6'];

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generateOneSet() {
      const pool = Array.from({ length: MAX - MIN + 1 }, (_, i) => MIN + i);
      const shuffled = shuffle(pool);
      const numbers = shuffled.slice(0, PICK).sort((a, b) => a - b);
      const rest = shuffled.slice(PICK);
      const bonus = rest[Math.floor(Math.random() * rest.length)];
      return { numbers, bonus };
    }

    function getBallClass(index) {
      return BALL_CLASSES[index % BALL_CLASSES.length];
    }

    function createBall(num, addRevealClass = false) {
      const ball = document.createElement('span');
      const idx = parseInt(num, 10);
      ball.className = `ball ${getBallClass(Math.floor((idx - 1) / 8))}`;
      if (addRevealClass) ball.classList.add('reveal');
      ball.textContent = num;
      return ball;
    }

    function createBonusBall(num, addRevealClass = false) {
      const ball = document.createElement('span');
      ball.className = 'ball bonus';
      if (addRevealClass) ball.classList.add('reveal');
      ball.textContent = num;
      return ball;
    }

    function setSaveStatus(message, isError) {
      const el = document.getElementById('saveStatus');
      if (!el) return;
      el.textContent = message;
      el.className = 'save-status' + (isError ? ' error' : '');
      if (message) setTimeout(function () { el.textContent = ''; }, isError ? 8000 : 3000);
    }

    async function saveDrawsToSupabase(sets) {
      if (typeof supabase === 'undefined') {
        setSaveStatus('Supabase 로드 실패', true);
        return;
      }
      if (!supabaseConfig.url || !supabaseConfig.key) {
        setSaveStatus('연결 설정 없음 (배포 URL에서 실행 중인지 확인)', true);
        return;
      }
      try {
        const client = supabase.createClient(supabaseConfig.url, supabaseConfig.key);
        for (const set of sets) {
          const { error } = await client.from('lotto_draws').insert({
            numbers: set.numbers,
            bonus: set.bonus
          });
          if (error) {
            console.warn('Supabase 저장 실패:', error);
            setSaveStatus('저장 실패: ' + (error.message || error.code || '알 수 없음'), true);
            return;
          }
        }
        setSaveStatus('저장됨', false);
      } catch (e) {
        console.warn('Supabase 연결 실패:', e);
        setSaveStatus('저장 실패: ' + (e.message || '네트워크 오류'), true);
      }
    }

    function renderMainBalls(numbers, bonus) {
      const area = document.getElementById('resultArea');
      area.innerHTML = '';
      numbers.forEach((num) => area.appendChild(createBall(num)));
      const bonusArea = document.getElementById('bonusArea');
      const bonusEl = bonusArea.querySelector('.ball.bonus');
      if (bonusEl) {
        bonusEl.textContent = bonus;
        bonusEl.classList.remove('placeholder');
      } else {
        bonusArea.appendChild(createBonusBall(bonus));
      }
    }

    function renderSets(sets) {
      const container = document.getElementById('setsContainer');
      const list = document.getElementById('setsList');
      list.innerHTML = '';
      if (sets.length === 0) {
        container.style.display = 'none';
        return;
      }
      container.style.display = 'block';
      sets.forEach((set) => {
        const row = document.createElement('div');
        row.className = 'set-row';
        set.numbers.forEach((num) => row.appendChild(createBall(num)));
        const bonusLabel = document.createElement('span');
        bonusLabel.className = 'bonus-label';
        bonusLabel.textContent = '보너스';
        row.appendChild(bonusLabel);
        row.appendChild(createBonusBall(set.bonus));
        list.appendChild(row);
      });
    }

    function runGenerate() {
      const setCountInput = document.getElementById('setCount');
      const setCount = Math.min(10, Math.max(1, parseInt(setCountInput.value, 10) || 1));
      setCountInput.value = setCount;

      const sets = [];
      for (let i = 0; i < setCount; i++) sets.push(generateOneSet());

      renderMainBalls(sets[0].numbers, sets[0].bonus);
      saveDrawsToSupabase(sets);

      if (setCount > 1) {
        renderSets(sets);
        document.getElementById('setsContainer').style.display = 'block';
      } else {
        document.getElementById('setsContainer').style.display = 'none';
      }
    }

    document.getElementById('btnGenerate').addEventListener('click', runGenerate);

    // 최근 10회 1등 당첨번호 (웹 검색 기준)
    const LOTTO_RECENT_10 = [
      { round: 1214, date: '2026.3.7', numbers: [10, 15, 19, 27, 30, 33], bonus: 14 },
      { round: 1213, date: '2026.2.28', numbers: [5, 11, 25, 27, 36, 38], bonus: 2 },
      { round: 1212, date: '2026.2.21', numbers: [5, 8, 25, 31, 41, 44], bonus: 45 },
      { round: 1211, date: '2026.2.14', numbers: [23, 26, 27, 35, 38, 40], bonus: 10 },
      { round: 1210, date: '2026.2.7', numbers: [1, 7, 9, 17, 27, 38], bonus: 31 },
      { round: 1209, date: '2026.1.31', numbers: [2, 17, 20, 35, 37, 39], bonus: 24 },
      { round: 1208, date: '2026.1.24', numbers: [6, 27, 30, 36, 38, 42], bonus: 25 },
      { round: 1207, date: '2026.1.17', numbers: [10, 22, 24, 27, 38, 45], bonus: 11 },
      { round: 1206, date: '2026.1.10', numbers: [1, 3, 17, 26, 27, 42], bonus: 23 },
      { round: 1205, date: '2026.1.3', numbers: [1, 4, 16, 23, 31, 41], bonus: 2 }
    ];

    function createHistoryBall(num) {
      const ball = document.createElement('span');
      ball.className = `ball ${getBallClass(Math.floor((num - 1) / 8))}`;
      ball.textContent = num;
      return ball;
    }

    function renderLottoRecent() {
      const list = document.getElementById('lottoRecentList');
      list.innerHTML = '';
      LOTTO_RECENT_10.forEach(function (row) {
        const wrap = document.createElement('div');
        wrap.className = 'lotto-recent-row';
        const roundEl = document.createElement('span');
        roundEl.className = 'lotto-recent-round';
        roundEl.textContent = row.round + '회';
        const dateEl = document.createElement('span');
        dateEl.className = 'lotto-recent-date';
        dateEl.textContent = row.date;
        wrap.appendChild(roundEl);
        wrap.appendChild(dateEl);
        row.numbers.forEach(function (n) { wrap.appendChild(createHistoryBall(n)); });
        const bonusLabel = document.createElement('span');
        bonusLabel.className = 'bonus-label';
        bonusLabel.textContent = '보너스';
        wrap.appendChild(bonusLabel);
        const bonusBall = document.createElement('span');
        bonusBall.className = 'ball bonus';
        bonusBall.textContent = row.bonus;
        wrap.appendChild(bonusBall);
        list.appendChild(wrap);
      });
    }

    // 첫 화면: 번호만 표시 (추첨 연출 없이)
    (function init() {
      const set = generateOneSet();
      renderMainBalls(set.numbers, set.bonus);
      document.getElementById('setsContainer').style.display = 'none';
      renderLottoRecent();
    })();
  </script>
</body>
</html>
